name: driverassist
description: A smart driving companion mobile application.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  google_fonts: ^6.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.5
  firebase_messaging: ^15.1.5
  sqflite: ^2.3.3+1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^17.2.4
  speech_to_text: ^7.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  http: ^1.2.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  google_maps_flutter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
